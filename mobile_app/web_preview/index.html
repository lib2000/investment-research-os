<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>InvestLog Preview</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, "Noto Sans KR", sans-serif;
        background: #f5f7fb;
        color: #111827;
      }

      body {
        margin: 0;
      }

      .app {
        max-width: 760px;
        margin: 0 auto;
        padding: 24px 18px 40px;
      }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.1;
      }

      .subtitle {
        color: #64748b;
        font-size: 13px;
        margin-top: 6px;
      }

      .tabs {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 4px;
        background: #e5eaf1;
        border-radius: 8px;
        padding: 4px;
        margin-bottom: 16px;
      }

      button {
        border: 0;
        border-radius: 6px;
        cursor: pointer;
        font: inherit;
        font-weight: 800;
        min-height: 42px;
      }

      .secondary,
      .danger-button {
        border: 1px solid #cbd5e1;
        min-height: 34px;
        padding: 8px 10px;
        width: 100%;
      }

      .secondary {
        background: #fff;
        color: #0f172a;
      }

      .danger-button {
        background: #fef2f2;
        color: #b91c1c;
        margin-top: 6px;
      }

      input,
      select,
      textarea {
        box-sizing: border-box;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        display: block;
        font: inherit;
        margin: 6px 0 12px;
        padding: 10px;
        width: 100%;
      }

      .form-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .period-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 6px;
      }

      .period-choice {
        background: #fff;
        border: 1px solid #cbd5e1;
        color: #0f172a;
        min-height: 40px;
      }

      .period-choice.active {
        background: #0f766e;
        border-color: #0f766e;
        color: #fff;
      }

      textarea {
        resize: vertical;
      }

      .tab {
        background: transparent;
        color: #64748b;
      }

      .tab.active {
        background: #fff;
        color: #0f172a;
      }

      .primary {
        width: 100%;
        background: #0f766e;
        color: #fff;
        margin-top: 14px;
      }

      .primary:disabled {
        background: #94a3b8;
      }

      .panel {
        background: #fff;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        margin-bottom: 14px;
        padding: 16px;
      }

      .panel-title {
        font-size: 17px;
        font-weight: 800;
        margin-bottom: 12px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .metric {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        min-height: 72px;
        padding: 12px;
      }

      .metric-label,
      .muted {
        color: #64748b;
        font-size: 12px;
      }

      .metric-label {
        font-weight: 700;
      }

      .metric-value {
        font-size: 17px;
        font-weight: 800;
        margin-top: 8px;
        overflow-wrap: anywhere;
      }

      .row {
        border-top: 1px solid #e5e7eb;
        display: flex;
        gap: 12px;
        justify-content: space-between;
        padding: 12px 0;
      }

      .row-main {
        min-width: 0;
      }

      .row-title {
        font-size: 15px;
        font-weight: 800;
      }

      .row-side {
        max-width: 150px;
        text-align: right;
      }

      .good {
        color: #0f766e;
      }

      .danger {
        color: #dc2626;
      }

      .error {
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 8px;
        color: #b91c1c;
        margin-bottom: 14px;
        padding: 10px;
      }

      .notice {
        background: #f8fafc;
        border: 1px solid #dbe3ef;
        border-radius: 8px;
        color: #334155;
        margin-top: 10px;
        padding: 10px;
      }

      .notice.success {
        background: #ecfdf5;
        border-color: #99f6e4;
        color: #0f766e;
      }

      .notice.warning {
        background: #fffbeb;
        border-color: #fde68a;
        color: #92400e;
      }

      .notice.danger {
        background: #fef2f2;
        border-color: #fecaca;
        color: #b91c1c;
      }

      .bar-track {
        background: #e5e7eb;
        border-radius: 999px;
        height: 8px;
        margin-top: 8px;
        overflow: hidden;
      }

      .bar-fill {
        background: #0f766e;
        height: 100%;
      }

      .bar-fill.negative {
        background: #dc2626;
      }

      .chart {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 8px;
        margin-bottom: 12px;
        padding: 12px;
      }

      .chart svg {
        display: block;
        height: auto;
        width: 100%;
      }

      .chart-labels {
        display: grid;
        gap: 8px;
        margin-top: 10px;
      }

      .chart-legend {
        align-items: center;
        display: flex;
        gap: 8px;
        justify-content: space-between;
      }

      .legend-main {
        align-items: center;
        display: flex;
        gap: 8px;
        min-width: 0;
      }

      .legend-dot {
        border-radius: 999px;
        flex: 0 0 10px;
        height: 10px;
        width: 10px;
      }

      .hidden {
        display: none;
      }

      @media (max-width: 520px) {
        .grid,
        .form-grid,
        .period-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header>
        <div>
          <h1>InvestLog</h1>
          <div class="subtitle">KIWOOM · http://127.0.0.1:8010</div>
        </div>
        <div id="loading" class="subtitle">준비됨</div>
      </header>

      <nav class="tabs">
        <button class="tab active" data-tab="portfolio">포트폴리오</button>
        <button class="tab" data-tab="sync">동기화</button>
        <button class="tab" data-tab="drafts">일지 초안</button>
        <button class="tab" data-tab="manual">수동입력</button>
        <button class="tab" data-tab="analytics">분석</button>
      </nav>

      <div id="error" class="error hidden"></div>
      <section id="content"></section>
    </main>

    <script>
      const API_BASE_URL = "http://127.0.0.1:8010";
      const ACCESS_TOKEN = "dev-local-token";
      const FIRST_HISTORY_YEAR = 2020;
      const CURRENT_YEAR = new Date().getFullYear();
      const CHART_LIMITS = {
        periodBars: 12,
        profitTrendPoints: 24,
        allocationSegments: 6,
      };
      const HISTORY_PERIODS = [
        ...Array.from(
          { length: CURRENT_YEAR - FIRST_HISTORY_YEAR + 1 },
          (_, index) => {
            const year = CURRENT_YEAR - index;
            return { key: `year-${year}`, label: `${year}년`, year };
          }
        ),
        { key: "custom", label: "직접", months: null },
      ];
      const state = {
        tab: "portfolio",
        portfolio: null,
        latestSync: null,
        historySyncResult: null,
        historyJob: null,
        historyPeriod: `year-${CURRENT_YEAR}`,
        historyCustomStart: `${CURRENT_YEAR}-01-01`,
        historyCustomEnd: localDateInput(new Date()),
        isHistorySyncing: false,
        drafts: [],
        entries: [],
        manualTransactions: [],
        manualImportResult: null,
        analytics: null,
        selectedDraft: null,
        selectedEntry: null,
        entryFilters: {
          search: "",
          ticker: "",
          strategy_name: "",
          setup_tag: "",
          result: "",
          rule_status: "",
        },
      };

      const content = document.getElementById("content");
      const loading = document.getElementById("loading");
      const errorBox = document.getElementById("error");

      document.querySelectorAll(".tab").forEach((button) => {
        button.addEventListener("click", () => {
          state.tab = button.dataset.tab;
          document.querySelectorAll(".tab").forEach((item) => {
            item.classList.toggle("active", item.dataset.tab === state.tab);
          });
          render();
        });
      });

      async function request(path, options = {}) {
        const response = await fetch(`${API_BASE_URL}${path}`, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${ACCESS_TOKEN}`,
            ...(options.headers || {}),
          },
        });

        if (!response.ok) {
          let message = `HTTP ${response.status}`;
          try {
            const payload = await response.json();
            message = payload?.error?.message || payload?.detail || message;
          } catch (error) {
            // Keep the HTTP status fallback when the response body is not JSON.
          }
          throw new Error(message);
        }

        return response.json();
      }

      async function requestAnalytics() {
        try {
          return await request("/api/v1/journal/analytics");
        } catch (error) {
          console.warn("분석 API를 불러오지 못했습니다.", error);
          return {};
        }
      }

      async function loadAll() {
        setLoading(true);
        setError("");
        try {
          const [portfolio, latestSync, latestHistory, drafts, entries, manualTransactions, analytics] = await Promise.all([
            request("/api/v1/portfolio"),
            request("/api/v1/sync/latest"),
            request("/api/v1/sync/kiwoom/history/latest"),
            request("/api/v1/journal/drafts"),
            request(`/api/v1/journal/entries${entryFilterQuery()}`),
            request("/api/v1/manual-transactions"),
            requestAnalytics(),
          ]);
          state.portfolio = portfolio;
          state.latestSync = latestSync.sync_run;
          if (latestHistory.job?.id) {
            state.historyJob = latestHistory.job;
            state.isHistorySyncing = isActiveHistoryJob(latestHistory.job);
          }
          state.drafts = drafts.drafts || [];
          state.entries = entries.entries || [];
          state.manualTransactions = manualTransactions.transactions || [];
          state.analytics = analytics;
          render();
        } catch (error) {
          setError(error.message);
        } finally {
          setLoading(false);
        }
      }

      async function runSync() {
        setLoading(true);
        setError("");
        try {
          await request("/api/v1/sync/kiwoom", { method: "POST" });
          await loadAll();
          state.tab = "drafts";
          document.querySelectorAll(".tab").forEach((item) => {
            item.classList.toggle("active", item.dataset.tab === state.tab);
          });
          render();
        } catch (error) {
          setError(error.message);
        } finally {
          setLoading(false);
        }
      }

      async function runHistorySync() {
        if (state.historyPeriod === "custom") {
          state.historyCustomStart = document.getElementById("history-custom-start").value;
          state.historyCustomEnd = document.getElementById("history-custom-end").value;
        }
        const range = historyDateRange(state.historyPeriod);

        setLoading(true);
        setError("");
        state.historySyncResult = null;
        state.historyJob = null;
        state.isHistorySyncing = true;
        render();
        try {
          const accepted = await request(
            `/api/v1/sync/kiwoom/history/start?start_date=${encodeURIComponent(range.startDate)}&end_date=${encodeURIComponent(range.endDate)}`,
            { method: "POST" }
          );
          state.historyJob = accepted.job;
          pollHistoryJob(accepted.job.id);
        } catch (error) {
          setError(error.message);
          state.isHistorySyncing = false;
        } finally {
          setLoading(false);
          render();
        }
      }

      async function pollHistoryJob(jobId) {
        if (!jobId) return;
        try {
          const response = await request(`/api/v1/sync/kiwoom/history/jobs/${jobId}`);
          state.historyJob = response.job;
          state.isHistorySyncing = isActiveHistoryJob(response.job);
          if (state.tab === "sync") renderSync();
          if (state.isHistorySyncing) {
            window.setTimeout(() => pollHistoryJob(jobId), 2500);
          } else {
            await loadAll();
          }
        } catch (error) {
          setError(error.message);
          state.isHistorySyncing = false;
          if (state.tab === "sync") renderSync();
        }
      }

      async function cancelHistorySync() {
        const jobId = state.historyJob?.id;
        if (!jobId) return;
        setLoading(true);
        setError("");
        try {
          const response = await request(`/api/v1/sync/kiwoom/history/jobs/${jobId}/cancel`, {
            method: "POST",
          });
          state.historyJob = response.job;
          state.isHistorySyncing = isActiveHistoryJob(response.job);
          renderSync();
          pollHistoryJob(jobId);
        } catch (error) {
          setError(error.message);
        } finally {
          setLoading(false);
        }
      }

      async function clearHistoryRecords() {
        setLoading(true);
        setError("");
        try {
          const preview = await request("/api/v1/sync/kiwoom/history/records", { method: "DELETE" });
          if (preview.requires_confirm) {
            const ok = window.confirm(`불러온 초안과 동기화 기록 ${preview.record_count || 0}건을 삭제할까요? 작성 완료한 매매일지는 유지됩니다.`);
            if (!ok) {
              return;
            }
            await request("/api/v1/sync/kiwoom/history/records?confirm=true", { method: "DELETE" });
          }
          state.historyJob = null;
          state.historySyncResult = null;
          state.isHistorySyncing = false;
          await loadAll();
        } catch (error) {
          setError(error.message);
        } finally {
          setLoading(false);
        }
      }

      function render() {
        if (state.tab === "portfolio") {
          renderPortfolio();
        } else if (state.tab === "sync") {
          renderSync();
        } else if (state.tab === "drafts") {
          renderDrafts();
        } else if (state.tab === "manual") {
          renderManualTransactions();
        } else {
          renderAnalytics();
        }
      }

      function renderPortfolio() {
        const portfolio = state.portfolio || {};
        const summary = portfolio.summary || {};
        const holdings = portfolio.holdings || [];
        content.innerHTML = `
          <div class="panel">
            <div class="panel-title">자산 요약</div>
            <div class="grid">
              ${metric("평가금액", krw(summary.total_evaluation_amount))}
              ${metric("매입금액", krw(summary.total_purchase_amount))}
              ${metric("평가손익", krw(summary.total_evaluation_profit_loss), summary.total_evaluation_profit_loss < 0 ? "danger" : "good")}
              ${metric("수익률", pct(summary.total_profit_rate), summary.total_profit_rate < 0 ? "danger" : "good")}
            </div>
          </div>
          <div class="panel">
            <div class="panel-title">보유 종목 ${portfolio.holdings_count || 0}</div>
            ${
              holdings.length
                ? holdings.map(holdingRow).join("")
                : '<div class="muted">보유 종목이 없습니다.</div>'
            }
          </div>
        `;
      }

      function renderSync() {
        const sync = state.latestSync || {};
        const historyResult = state.historySyncResult;
        const historyJob = state.historyJob || {};
        const historyRange = historyDateRange(state.historyPeriod);
        const isHistoryRunning = state.isHistorySyncing || isActiveHistoryJob(historyJob);
        const historyStatus = historyJobStatus(historyJob, isHistoryRunning);
        const progressValue = Number(historyJob.progress_rate || 0);
        content.innerHTML = `
          <div class="panel">
            <div class="panel-title">최근 동기화</div>
            <div class="metric-value good">${sync.status || "기록 없음"}</div>
            <div class="muted">${sync.finished_at ? dateTime(sync.finished_at) : "아직 저장된 동기화가 없습니다."}</div>
            <div class="grid" style="margin-top:14px">
              ${metric("보유종목", String(sync.portfolio_holdings_count || 0))}
              ${metric("일지초안", String(state.drafts.length || 0))}
            </div>
          </div>
          <button id="sync-button" class="primary">키움 데이터 동기화</button>
          <div class="panel" style="margin-top:14px">
            <div class="panel-title">과거 거래 불러오기</div>
            <div class="period-grid">
              ${HISTORY_PERIODS.map(historyPeriodButton).join("")}
            </div>
            ${
              state.historyPeriod === "custom"
                ? `<div class="form-grid" style="margin-top:10px">
                    <div>
                      <label class="muted">시작일</label>
                      <input id="history-custom-start" type="date" value="${state.historyCustomStart}" />
                    </div>
                    <div>
                      <label class="muted">종료일</label>
                      <input id="history-custom-end" type="date" value="${state.historyCustomEnd}" />
                    </div>
                  </div>`
                : ""
            }
            <div class="muted" style="margin-top:10px">${formatSyncDate(historyRange.startDate.replaceAll("-", ""))}부터 ${formatSyncDate(historyRange.endDate.replaceAll("-", ""))}까지 불러옵니다.</div>
            <button id="history-sync-button" class="primary" ${isHistoryRunning ? "disabled" : ""}>${isHistoryRunning ? "불러오는 중" : "과거 거래 불러오기"}</button>
            <div class="form-grid">
              <button id="history-cancel-button" class="secondary" ${isHistoryRunning ? "" : "disabled"}>멈춤</button>
              <button id="history-clear-button" class="danger-button" ${isHistoryRunning ? "disabled" : ""}>기록 삭제</button>
            </div>
            ${
              isHistoryRunning || historyJob.id
                ? `<div style="margin-top:14px">
                    <div class="grid">
                      ${metric("진행률", historyJob.progress_rate == null ? "준비 중" : `${historyJob.progress_rate}%`)}
                      ${metric("처리 일수", `${historyJob.processed_days || 0}/${historyJob.total_days || 0}일`)}
                      ${metric("복기 대기", `${historyJob.total_needs_review_count || 0}건`)}
                      ${metric("상태", historyStatus.label, historyStatus.tone)}
                      ${metric("매매 요약", `${historyJob.total_journal_items_count || 0}건`)}
                      ${metric("체결 상세", `${historyJob.total_order_executions_count || 0}건`)}
                      ${metric("현재 처리일", historyJob.current_date ? formatSyncDate(historyJob.current_date) : "-")}
                      ${metric("마지막 성공일", historyJob.last_success_date ? formatSyncDate(historyJob.last_success_date) : "-")}
                      ${metric("다음 재개일", historyJob.next_date ? formatSyncDate(historyJob.next_date) : "-")}
                      ${metric("재시도/대기", `${historyJob.retry_count || 0}회 · ${historyJob.last_backoff_seconds || 0}초`)}
                    </div>
                    <div class="bar-track">
                      <div class="bar-fill ${historyStatus.tone === "danger" ? "negative" : ""}" style="width:${Math.max(progressValue, isHistoryRunning ? 4 : 0)}%"></div>
                    </div>
                    <div class="notice ${historyStatus.noticeTone}">
                      <strong>${historyStatus.title}</strong>
                      <div style="margin-top:4px">${historyStatus.message}</div>
                    </div>
                  </div>`
                : historyResult
                ? `<div style="margin-top:14px">
                    <div class="grid">
                      ${metric("조회 일수", `${historyResult.days_synced || 0}일`)}
                      ${metric("생성 초안", `${historyResult.total_needs_review_count || 0}건`)}
                      ${metric("매매 요약", `${historyResult.total_journal_items_count || 0}건`)}
                      ${metric("체결 상세", `${historyResult.total_order_executions_count || 0}건`)}
                    </div>
                    ${(historyResult.results || []).map(historyResultRow).join("")}
                  </div>`
                : '<div class="muted" style="margin-top:10px">최대 1년까지 한 번에 불러올 수 있습니다.</div>'
            }
          </div>
        `;
        document.getElementById("sync-button").addEventListener("click", runSync);
        document.getElementById("history-sync-button").addEventListener("click", runHistorySync);
        document.getElementById("history-cancel-button").addEventListener("click", cancelHistorySync);
        document.getElementById("history-clear-button").addEventListener("click", clearHistoryRecords);
        document.querySelectorAll("[data-history-period]").forEach((button) => {
          button.addEventListener("click", () => {
            if (state.historyPeriod === "custom") {
              state.historyCustomStart = document.getElementById("history-custom-start")?.value || state.historyCustomStart;
              state.historyCustomEnd = document.getElementById("history-custom-end")?.value || state.historyCustomEnd;
            }
            state.historyPeriod = button.dataset.historyPeriod;
            state.historySyncResult = null;
            renderSync();
          });
        });
        document.getElementById("history-custom-start")?.addEventListener("change", (event) => {
          state.historyCustomStart = event.target.value;
          renderSync();
        });
        document.getElementById("history-custom-end")?.addEventListener("change", (event) => {
          state.historyCustomEnd = event.target.value;
          renderSync();
        });
      }

      function renderDrafts() {
        content.innerHTML = `
          <div class="panel">
            <div class="panel-title">복기 대기 ${state.drafts.length}</div>
            ${
              state.drafts.length
                ? state.drafts.map(draftRow).join("")
                : '<div class="muted">복기할 초안이 없습니다.</div>'
            }
          </div>
          <div class="panel">
            <div class="panel-title">작성 완료 ${state.entries.length}</div>
            <div class="form-grid">
              <div>
                <label class="muted">검색</label>
                <input id="entry-filter-search" placeholder="종목명, 근거, 메모" value="${escapeAttr(state.entryFilters.search)}" />
              </div>
              <div>
                <label class="muted">종목코드</label>
                <input id="entry-filter-ticker" placeholder="예: 005930" value="${escapeAttr(state.entryFilters.ticker)}" />
              </div>
              <div>
                <label class="muted">전략명</label>
                <input id="entry-filter-strategy-name" placeholder="예: ORB" value="${escapeAttr(state.entryFilters.strategy_name)}" />
              </div>
              <div>
                <label class="muted">셋업 태그</label>
                <input id="entry-filter-setup-tag" placeholder="예: gap-up" value="${escapeAttr(state.entryFilters.setup_tag)}" />
              </div>
              <div>
                <label class="muted">성과</label>
                <select id="entry-filter-result">
                  <option value="" ${state.entryFilters.result === "" ? "selected" : ""}>전체</option>
                  <option value="profit" ${state.entryFilters.result === "profit" ? "selected" : ""}>수익</option>

      // Preview-only SVG charts. When this screen moves to React Native, replace
      // these helpers with a maintained chart library for tooltips, zoom, and touch.
      function periodBarChart(items, valueKey) {
        const rows = (items || []).filter((item) => Number.isFinite(Number(item[valueKey])));
        if (!rows.length) return "";
        const chartRows = rows.slice(0, CHART_LIMITS.periodBars).reverse();
        const width = 320;
        const height = 150;
        const padding = 28;
        const baseline = 76;
        const graphWidth = width - padding * 2;
        const maxAbs = Math.max(...chartRows.map((item) => Math.abs(Number(item[valueKey] || 0))), 1);
        const slot = graphWidth / chartRows.length;
        const barWidth = Math.max(Math.min(slot * 0.54, 22), 8);
        const bars = chartRows
          .map((item, index) => {
            const value = Number(item[valueKey] || 0);
            const magnitude = Math.abs(value) / maxAbs;
            const barHeight = Math.max(magnitude * 54, value === 0 ? 1 : 3);
            const x = padding + index * slot + (slot - barWidth) / 2;
            const y = value >= 0 ? baseline - barHeight : baseline;
            const color = value >= 0 ? "#0f766e" : "#dc2626";
            const label = String(item.period || item.month || item.date || "").replace(/^20/, "");
            return `
              <rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barWidth.toFixed(1)}" height="${barHeight.toFixed(1)}" rx="3" fill="${color}"></rect>
              <text x="${(x + barWidth / 2).toFixed(1)}" y="134" text-anchor="middle" font-size="9" fill="#64748b">${escapeSvg(label)}</text>
            `;
          })
          .join("");
        return `
          <div class="chart">
            <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="기간별 수익 그래프">
              <line x1="${padding}" y1="${baseline}" x2="${width - padding}" y2="${baseline}" stroke="#cbd5e1" stroke-width="1"></line>
              ${bars}
            </svg>
          </div>
        `;
      }

      function profitLineChart(items) {
        const rows = (items || []).filter((item) => Number.isFinite(Number(item.cumulative_profit_loss)));
        if (!rows.length) return "";
        const chartRows = rows.slice(-CHART_LIMITS.profitTrendPoints);
        const width = 320;
        const height = 170;
        const paddingX = 28;
        const paddingY = 22;
        const values = chartRows.map((item) => Number(item.cumulative_profit_loss || 0));
        const minValue = Math.min(...values, 0);
        const maxValue = Math.max(...values, 0);
        const range = Math.max(maxValue - minValue, 1);
        const xStep = chartRows.length > 1 ? (width - paddingX * 2) / (chartRows.length - 1) : 0;
        const yFor = (value) => paddingY + ((maxValue - value) / range) * (height - paddingY * 2 - 28);
        const points = chartRows
          .map((item, index) => {
            const x = chartRows.length > 1 ? paddingX + index * xStep : width / 2;
            return `${x.toFixed(1)},${yFor(Number(item.cumulative_profit_loss || 0)).toFixed(1)}`;
          })
          .join(" ");
        const zeroY = yFor(0);
        const markers = chartRows
          .map((item, index) => {
            const x = chartRows.length > 1 ? paddingX + index * xStep : width / 2;
            const y = yFor(Number(item.cumulative_profit_loss || 0));
            return `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="2.7" fill="#0f766e"></circle>`;
          })
          .join("");
        const firstLabel = chartRows[0]?.date || "";
        const lastLabel = chartRows[chartRows.length - 1]?.date || "";
        return `
          <div class="chart">
            <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="누적 수익 추이 그래프">
              <line x1="${paddingX}" y1="${zeroY.toFixed(1)}" x2="${width - paddingX}" y2="${zeroY.toFixed(1)}" stroke="#cbd5e1" stroke-width="1"></line>
              <polyline points="${points}" fill="none" stroke="#0f766e" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"></polyline>
              ${markers}
              <text x="${paddingX}" y="${height - 8}" font-size="10" fill="#64748b">${escapeSvg(firstLabel)}</text>
              <text x="${width - paddingX}" y="${height - 8}" text-anchor="end" font-size="10" fill="#64748b">${escapeSvg(lastLabel)}</text>
            </svg>
          </div>
        `;
      }

      function allocationDonutChart(items, labelKey) {
        const rows = (items || [])
          .filter((item) => Number(item.weight || 0) > 0)
          .slice(0, CHART_LIMITS.allocationSegments);
        if (!rows.length) return "";
        const colors = ["#0f766e", "#2563eb", "#7c3aed", "#d97706", "#dc2626", "#64748b"];
        const radius = 44;
        const circumference = 2 * Math.PI * radius;
        let offset = 0;
        const segments = rows
          .map((item, index) => {
            const weight = Math.max(Number(item.weight || 0), 0);
            const length = (weight / 100) * circumference;
            const segment = `
              <circle cx="60" cy="60" r="${radius}" fill="none" stroke="${colors[index % colors.length]}" stroke-width="18"
                stroke-dasharray="${length.toFixed(2)} ${(circumference - length).toFixed(2)}"
                stroke-dashoffset="${(-offset).toFixed(2)}" transform="rotate(-90 60 60)"></circle>
            `;
            offset += length;
            return segment;
          })
          .join("");
        const legends = rows
          .map((item, index) => {
            const rawLabel = labelKey === "transaction_type" ? transactionTypeLabel(item[labelKey]) : item[labelKey];
            return `
              <div class="chart-legend">
                <div class="legend-main">
                  <span class="legend-dot" style="background:${colors[index % colors.length]}"></span>
                  <span class="row-title">${escapeHtml(rawLabel || "미지정")}</span>
                </div>
                <span class="${item.profit_loss_total < 0 ? "danger" : "good"}">${item.weight == null ? "-" : pct(item.weight)}</span>
              </div>
            `;
          })
          .join("");
        return `
          <div class="chart">
            <svg viewBox="0 0 120 120" role="img" aria-label="비중 그래프">
              <circle cx="60" cy="60" r="${radius}" fill="none" stroke="#e5e7eb" stroke-width="18"></circle>
              ${segments}
              <text x="60" y="58" text-anchor="middle" font-size="13" font-weight="800" fill="#0f172a">${rows.length}</text>
              <text x="60" y="74" text-anchor="middle" font-size="10" fill="#64748b">분류</text>
            </svg>
            <div class="chart-labels">${legends}</div>
          </div>
        `;
      }

      function historyJobStatus(job, isRunning) {
        const status = String(job?.status || (isRunning ? "running" : ""));
        const drafts = Number(job?.total_needs_review_count || 0);
        const journals = Number(job?.total_journal_items_count || 0);
        const executions = Number(job?.total_order_executions_count || 0);
        const processed = Number(job?.processed_days || 0);
        const total = Number(job?.total_days || 0);
        if (status === "success") {
          if (drafts || journals || executions) {
            return {
              label: "완료",
              title: "과거 거래 불러오기 완료",
              message: `총 ${processed}/${total || processed}일 처리, 복기 대기 ${drafts}건, 매매 요약 ${journals}건, 체결 상세 ${executions}건을 확인했습니다.`,
              tone: "good",
              noticeTone: "success",
            };
          }
          return {
            label: "완료",
            title: "거래 없음",
            message: `총 ${processed}/${total || processed}일을 정상 조회했지만, 해당 기간에 키움에서 가져올 매매 요약이나 체결 상세가 없습니다.`,
            tone: "good",
            noticeTone: "success",
          };
        }
        if (status === "failed") {
          return {
            label: "실패",
            title: "불러오기 실패",
            message: job?.error_message || "키움 과거 거래 불러오기가 실패했습니다. 잠시 후 같은 기간으로 다시 시도하세요.",
            tone: "danger",
            noticeTone: "danger",
          };
        }
        if (status === "cancelled") {
          return {
            label: "중지됨",
            title: "불러오기 중지됨",
            message: "사용자 요청으로 작업이 중지되었습니다. 같은 기간으로 다시 불러오면 다음 재개일부터 이어받습니다.",
            tone: "",
            noticeTone: "warning",
          };
        }
        if (status === "cancel_requested") {
          return {
            label: "중지 요청",
            title: "멈춤 요청 처리 중",
            message: "현재 날짜 처리가 끝나는 즉시 중지됩니다. 완료 전까지 창을 닫아도 서버 작업 상태는 저장됩니다.",
            tone: "",
            noticeTone: "warning",
          };
        }
        if (status === "paused") {
          return {
            label: "재개 대기",
            title: "이어받기 가능",
            message: "서버 재시작이나 중단으로 일시정지되었습니다. 같은 기간으로 다시 불러오면 다음 재개일부터 이어받습니다.",
            tone: "",
            noticeTone: "warning",
          };
        }
        return {
          label: "진행 중",
          title: "백그라운드 처리 중",
          message: "서버에서 날짜별로 천천히 조회 중입니다. API 속도 제한을 피하기 위해 지연 처리되며, 다른 화면으로 이동해도 계속 진행됩니다.",
          tone: "",
          noticeTone: "",
        };
      }

      function draftMeta(item, payload) {
        const sourceLabel = item.source_type === "trade_journal" ? "매매 요약" : "체결 상세";
        const tradeDate = draftDate(item.source_key);
        if (item.source_type === "trade_journal") {
          const amount = Number(payload.profit_loss_amount || 0);
          return {
            sourceLabel,
            tradeDate,
            quantityText: `매수 ${payload.buy_quantity || 0}주 / 매도 ${payload.sell_quantity || 0}주`,
            priceText: `매수평균 ${krw(payload.buy_average_price)} / 매도평균 ${krw(payload.sell_average_price)}`,
            valueText: `매수 ${krw(payload.buy_amount)} / 매도 ${krw(payload.sell_amount)}`,
            detailText: `손익 ${krw(payload.profit_loss_amount)} / 수익률 ${pct(payload.profit_rate)}`,
            resultText: `${krw(payload.profit_loss_amount)} · ${pct(payload.profit_rate)}`,
            resultTone: amount < 0 ? "danger" : "good",
          };
        }

        return {
          sourceLabel,
          tradeDate,
          quantityText: `주문 ${payload.order_quantity || 0}주 / 체결 ${payload.filled_quantity || 0}주 / 잔량 ${payload.remaining_quantity || 0}주`,
          priceText: `주문가 ${krw(payload.order_price)} / 체결가 ${krw(payload.filled_price)}`,
          valueText: `주문 ${payload.order_time || "-"} / 확인 ${payload.confirm_time || "-"}`,
          detailText: `구분 ${payload.trade_side_name || "-"} / 주문상태 ${payload.order_status || "-"}`,
          resultText: payload.trade_side_name || payload.order_type_name || payload.order_status || "-",
          resultTone: "",
        };
      }

        const match = String(sourceKey || "").match(/:(\d{8})(?=:)/);
        return match ? formatSyncDate(match[1]) : "-";
      }

            <textarea id="entry-reason" rows="3">${escapeHtml(entry?.entry_reason || "")}</textarea>
            <label class="muted">청산 근거</label>
            <textarea id="exit-reason" rows="3">${escapeHtml(entry?.exit_reason || "")}</textarea>
            <label class="muted">원칙 준수</label>
            <select id="rule-followed">
              <option value="" ${entry?.rule_followed == null ? "selected" : ""}>미확인</option>
              <option value="true" ${entry?.rule_followed === true ? "selected" : ""}>준수</option>
              <option value="false" ${entry?.rule_followed === false ? "selected" : ""}>위반</option>
            </select>
            <div class="form-grid">
              <div>
                <label class="muted">계획 진입가</label>
                <input id="planned-entry-price" inputmode="decimal" type="number" step="0.01" placeholder="예: 80000" value="${numberValue(entry?.planned_entry_price)}" />
              </div>
              <div>
                <label class="muted">실제 진입가</label>
                <input id="actual-entry-price" inputmode="decimal" type="number" step="0.01" placeholder="예: 80100" value="${numberValue(entry?.actual_entry_price)}" />
              </div>
              <div>
                <label class="muted">손절가</label>
                <input id="stop-loss-price" inputmode="decimal" type="number" step="0.01" placeholder="예: 79000" value="${numberValue(entry?.stop_loss_price)}" />
              </div>
              <div>
                <label class="muted">목표가</label>
                <input id="target-price" inputmode="decimal" type="number" step="0.01" placeholder="예: 82000" value="${numberValue(entry?.target_price)}" />
              </div>
              <div>
                <label class="muted">청산가</label>
                <input id="exit-price" inputmode="decimal" type="number" step="0.01" placeholder="예: 81800" value="${numberValue(entry?.exit_price)}" />
              </div>
            </div>
            <div class="form-grid">
              <div>
                <label class="muted">손익금액</label>
                <input id="manual-profit-loss-amount" inputmode="numeric" type="number" placeholder="예: 125000" value="${numberValue(entry?.manual_profit_loss_amount)}" />
              </div>
              <div>
                <label class="muted">수익률</label>
                <input id="manual-profit-rate" inputmode="decimal" type="number" step="0.01" placeholder="예: 2.35" value="${numberValue(entry?.manual_profit_rate)}" />
              </div>
              <div>
                <label class="muted">매수금액</label>
                <input id="manual-buy-amount" inputmode="numeric" type="number" placeholder="예: 5000000" value="${numberValue(entry?.manual_buy_amount)}" />
              </div>
              <div>
                <label class="muted">매도금액</label>
                <input id="manual-sell-amount" inputmode="numeric" type="number" placeholder="예: 5125000" value="${numberValue(entry?.manual_sell_amount)}" />
              </div>
              <div>
                <label class="muted">계획 리스크</label>
                <input id="planned-risk-amount" inputmode="numeric" type="number" placeholder="예: 100000" value="${numberValue(entry?.planned_risk_amount)}" />
              </div>
              <div>
                <label class="muted">실현 R</label>
                <input id="realized-r-multiple" inputmode="decimal" type="number" step="0.01" placeholder="비우면 손익/리스크로 계산" value="${numberValue(entry?.realized_r_multiple)}" />
              </div>
            </div>
            <label class="muted">잘한 점</label>
            <textarea id="good-points" rows="2">${escapeHtml(entry?.good_points || "")}</textarea>
            <label class="muted">개선점</label>
            <textarea id="improvement-points" rows="2">${escapeHtml(entry?.improvement_points || "")}</textarea>
            <label class="muted">메모</label>
            <textarea id="memo" rows="3">${escapeHtml(entry?.memo || "")}</textarea>
            <button id="save-entry" class="primary">${entry ? "매매일지 수정 저장" : "매매일지 저장"}</button>
          </div>
        `;

        document.getElementById("save-entry").addEventListener("click", async () => {
          const ruleValue = document.getElementById("rule-followed").value;
          await saveJournalEntry({
            draft_id: draft?.id || entry.draft_id,
            strategy_name: document.getElementById("strategy-name").value,
            setup_tags: document
              .getElementById("setup-tags")
              .value.split(",")
              .map((item) => item.trim())
              .filter(Boolean),
            entry_reason: document.getElementById("entry-reason").value,
            exit_reason: document.getElementById("exit-reason").value,
            rule_followed: ruleValue === "" ? null : ruleValue === "true",
            good_points: document.getElementById("good-points").value,
            improvement_points: document.getElementById("improvement-points").value,
            memo: document.getElementById("memo").value,
            manual_profit_loss_amount: intOrNull("manual-profit-loss-amount"),
            manual_profit_rate: floatOrNull("manual-profit-rate"),
            manual_buy_amount: intOrNull("manual-buy-amount"),
            manual_sell_amount: intOrNull("manual-sell-amount"),
            planned_entry_price: floatOrNull("planned-entry-price"),
            actual_entry_price: floatOrNull("actual-entry-price"),
            stop_loss_price: floatOrNull("stop-loss-price"),
            target_price: floatOrNull("target-price"),
            exit_price: floatOrNull("exit-price"),
            planned_risk_amount: intOrNull("planned-risk-amount"),
            realized_r_multiple: floatOrNull("realized-r-multiple"),
          });
        });
      }

      function intOrNull(id) {
        const value = document.getElementById(id).value.trim();
        return value === "" ? null : Number.parseInt(value, 10);
      }

      function floatOrNull(id) {
        const value = document.getElementById(id).value.trim();
        return value === "" ? null : Number.parseFloat(value);
      }

      async function saveJournalEntry(payload) {
        setLoading(true);
        setError("");
        try {
          await request("/api/v1/journal/entries", {
            method: "POST",
            body: JSON.stringify(payload),
          });
          state.selectedDraft = null;
          state.selectedEntry = null;
          await loadAll();
        } catch (error) {
          setError(error.message);
        } finally {
          setLoading(false);
        }
      }

      async function deleteJournalEntry(entryId) {
        setLoading(true);
        setError("");
        try {
          await request(`/api/v1/journal/entries/${entryId}`, { method: "DELETE" });
          if (state.selectedEntry?.id === entryId) {
            state.selectedEntry = null;
          }
          await loadAll();
        } catch (error) {
          setError(error.message);
        } finally {
          setLoading(false);
        }
      }

      async function saveManualTransaction() {
        setLoading(true);
        setError("");
        try {
          await request("/api/v1/manual-transactions", {
            method: "POST",
            body: JSON.stringify({
              trade_date: document.getElementById("manual-trade-date").value,
              broker: document.getElementById("manual-broker").value,
              account_name: document.getElementById("manual-account-name").value,
              transaction_type: document.getElementById("manual-transaction-type").value,
              currency: document.getElementById("manual-currency").value,
              fx_rate_krw: floatOrNull("manual-fx-rate-krw"),
              ticker: document.getElementById("manual-ticker").value,
              name: document.getElementById("manual-name").value,
              quantity: floatOrNull("manual-quantity"),
              price: floatOrNull("manual-price"),
              split_adjustment_ratio: floatOrNull("manual-split-adjustment-ratio") || 1,
              buy_amount: intOrNull("manual-buy-amount-input"),
              sell_amount: intOrNull("manual-sell-amount-input"),
              profit_loss_amount: intOrNull("manual-profit-loss-amount-input"),
              dividend_amount: intOrNull("manual-dividend-amount"),
              tax_amount: intOrNull("manual-tax-amount"),
              commission_amount: intOrNull("manual-commission-amount"),
              adjustment_note: document.getElementById("manual-adjustment-note").value,
              memo: document.getElementById("manual-memo").value,
            }),
          });
          await loadAll();
          state.tab = "manual";
          document.querySelectorAll(".tab").forEach((item) => {
            item.classList.toggle("active", item.dataset.tab === state.tab);
          });
          renderManualTransactions();
        } catch (error) {
          setError(error.message);
        } finally {
          setLoading(false);
        }
      }

      async function importManualTransactionsCsv() {
        const file = document.getElementById("manual-csv-file")?.files?.[0];
        if (!file) {
          setError("가져올 CSV 파일을 선택하세요.");
          return;
        }
        setLoading(true);
        setError("");
        try {
          const formData = new FormData();
          formData.append("file", file);
          const response = await fetch(`${API_BASE_URL}/api/v1/manual-transactions/import.csv`, {
            method: "POST",
            headers: {
              Authorization: `Bearer ${ACCESS_TOKEN}`,
            },
            body: formData,
          });
          if (!response.ok) {
            let message = `HTTP ${response.status}`;
            try {
              const payload = await response.json();
              message = payload?.error?.message || payload?.detail || message;
            } catch (error) {
              // Keep the HTTP status fallback when the response body is not JSON.
            }
            throw new Error(message);
          }
          state.manualImportResult = await response.json();
          await loadAll();
          state.tab = "manual";
          document.querySelectorAll(".tab").forEach((item) => {
            item.classList.toggle("active", item.dataset.tab === state.tab);
          });
          renderManualTransactions();
        } catch (error) {
          setError(error.message);
        } finally {
          setLoading(false);
        }
      }

      async function deleteManualTransaction(transactionId) {
        setLoading(true);
        setError("");
        try {
          await request(`/api/v1/manual-transactions/${transactionId}`, { method: "DELETE" });
          await loadAll();
          state.tab = "manual";
          document.querySelectorAll(".tab").forEach((item) => {
            item.classList.toggle("active", item.dataset.tab === state.tab);
          });
          renderManualTransactions();
        } catch (error) {
          setError(error.message);
        } finally {
          setLoading(false);
        }
      }

      async function exportJournalEntriesCsv() {
        setLoading(true);
        setError("");
        try {
          const response = await fetch(`${API_BASE_URL}/api/v1/journal/entries/export.csv${entryFilterQuery()}`, {
            headers: {
              Authorization: `Bearer ${ACCESS_TOKEN}`,
            },
          });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const blob = await response.blob();
          const url = URL.createObjectURL(blob);
          const anchor = document.createElement("a");
          anchor.href = url;
          anchor.download = `investment-journal-${new Date().toISOString().slice(0, 10)}.csv`;
          document.body.appendChild(anchor);
          anchor.click();
          anchor.remove();
          URL.revokeObjectURL(url);
        } catch (error) {
          setError(error.message);
        } finally {
          setLoading(false);
        }
      }

      function readEntryFiltersFromForm() {
        state.entryFilters = {
          search: document.getElementById("entry-filter-search").value.trim(),
          ticker: document.getElementById("entry-filter-ticker").value.trim(),
          strategy_name: document.getElementById("entry-filter-strategy-name").value.trim(),
          setup_tag: document.getElementById("entry-filter-setup-tag").value.trim(),
          result: document.getElementById("entry-filter-result").value,
          rule_status: document.getElementById("entry-filter-rule-status").value,
        };
      }

      function entryFilterQuery() {
        const params = new URLSearchParams();
        Object.entries(state.entryFilters).forEach(([key, value]) => {
          if (value) params.set(key, value);
        });
        const query = params.toString();
        return query ? `?${query}` : "";
      }

      function numberValue(value) {
        return value === null || value === undefined ? "" : String(value);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;");
      }

      function escapeAttr(value) {
        return escapeHtml(value).replaceAll('"', "&quot;");
      }

      function krw(value) {
        if (value === null || value === undefined) return "-";
        return `${Number(value).toLocaleString("ko-KR")}원`;
      }

      function money(value, currency) {
        if (value === null || value === undefined) return "-";
        return `${Number(value).toLocaleString("ko-KR")} ${currency || ""}`.trim();
      }

      function pct(value) {
        if (value === null || value === undefined) return "-";
        return `${Number(value).toFixed(2)}%`;
      }

      function rValue(value) {
        if (value === null || value === undefined) return "-";
        return `${Number(value).toFixed(2)}R`;
      }

      function dateTime(value) {
        if (!value) return "-";
        return new Date(value).toLocaleString("ko-KR", {
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      function localDateInput(value) {
        const offset = value.getTimezoneOffset();
        const localDate = new Date(value.getTime() - offset * 60 * 1000);
        return localDate.toISOString().slice(0, 10);
      }

      function historyDateRange(periodKey) {
        const period = HISTORY_PERIODS.find((item) => item.key === periodKey) || HISTORY_PERIODS[1];
        if (period.key === "custom") {
          return {
            startDate: state.historyCustomStart,
            endDate: state.historyCustomEnd,
          };
        }
        if (period.year) {
          const currentYear = new Date().getFullYear();
          return {
            startDate: `${period.year}-01-01`,
            endDate: period.year === currentYear
              ? localDateInput(new Date())
              : `${period.year}-12-31`,
          };
        }
        const end = new Date();
        const start = new Date(end);
        start.setMonth(start.getMonth() - period.months);
        start.setDate(start.getDate() + 1);
        return {
          startDate: localDateInput(start),
          endDate: localDateInput(end),
        };
      }

      function isActiveHistoryJob(job) {
        return job?.status === "running" || job?.status === "cancel_requested";
      }

      function formatSyncDate(value) {
        if (!value || value.length !== 8) return value || "-";
        return `${value.slice(0, 4)}-${value.slice(4, 6)}-${value.slice(6, 8)}`;
      }

      function setLoading(value) {
        loading.textContent = value ? "불러오는 중" : "준비됨";
      }

      function setError(message) {
        errorBox.textContent = message;
        errorBox.classList.toggle("hidden", !message);
      }

      render();
      loadAll();
    </script>
  </body>
</html>
